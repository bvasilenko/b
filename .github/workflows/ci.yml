name: ci

on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 1

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: typecheck
        run: bun run typecheck

      - name: lint
        run: bun run lint

      - name: test
        run: bun run test

      - name: public-voice-guard
        run: bash scripts/public_voice_guard.sh

      - name: build
        run: bun run build

      - name: tarball-size-budget
        run: |
          UNPACKED=$(npm pack --dry-run --json 2>/dev/null | node -e "process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'))[0].unpackedSize.toString())")
          [ "$UNPACKED" -le 1048576 ] || (echo "tarball exceeds 1 MB budget: ${UNPACKED} bytes" && exit 1)
          echo "tarball size OK: ${UNPACKED} bytes"

      - name: determinism-check
        run: |
          mv dist dist-1
          bun run build
          diff -r dist dist-1 || (echo "non-deterministic build" && exit 1)
          rm -rf dist-1

      - name: probe-consumer
        run: bash scripts/probe-consumer.sh

  publish:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.x
          no-cache: true

      - name: install
        run: bun install --frozen-lockfile

      - name: build
        run: bun run build

      - name: setup-npm-auth
        run: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: publish
        run: npm publish --access=public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
